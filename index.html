<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Дзен-монітор</title>
<style>
  :root{
    --bg-top:#0a0f12;
    --bg-bot:#0c1a1e;
    --num:#ffffff;
    --cap:#aebcc2;
    --accent:#f0c674;
    --live:#5ccb8a;
    --live-stale:#d8a657;
    --overlay:0.45;           /* затемнення відео (0..1): більше = темніше, числа читабельніші */
    --btn:#cdd7db;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:linear-gradient(180deg,var(--bg-top) 0%, var(--bg-bot) 100%);
    color:var(--num);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ВІДЕО-ФОН на весь екран */
  #bgvideo{
    position:fixed; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    z-index:0;
    background:#000;
  }
  /* затемнення поверх відео, щоб числа читалися */
  #overlay{
    position:fixed; inset:0; z-index:1;
    background:
      radial-gradient(120% 120% at 50% 40%, rgba(0,0,0,0) 40%, rgba(0,0,0,0.35) 100%),
      rgba(0,0,0,var(--overlay));
    pointer-events:none;
  }

  .wrap{
    position:relative; z-index:2;
    height:100dvh; height:100vh;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:clamp(18px,4.5vh,54px);
    padding:24px;
    text-shadow:0 2px 18px rgba(0,0,0,.55);   /* числа читабельні на будь-якому відео */
  }

  .stat{ text-align:center; line-height:1; }
  .num{
    font-variant-numeric:tabular-nums;
    font-feature-settings:"tnum" 1;
    font-weight:600;
    font-size:clamp(2.8rem,19vw,9rem);
    letter-spacing:-0.02em;
    transition:text-shadow .25s ease, transform .25s ease;
    will-change:transform;
  }
  .num.flash{
    color:var(--accent);
    text-shadow:0 0 28px rgba(240,198,116,.6), 0 0 64px rgba(240,198,116,.35), 0 2px 18px rgba(0,0,0,.55);
    transform:scale(1.04);
  }
  .cap{
    margin-top:clamp(6px,1.4vh,16px);
    color:var(--cap);
    font-size:clamp(.62rem,1.7vw,1rem);
    letter-spacing:.28em;
    text-transform:uppercase;
    font-weight:500;
  }
  /* рядок еквівалента: тиха "думка" під числами, над таймером */
  .equiv{
    color:var(--cap);
    font-size:clamp(.72rem,1.9vw,1.05rem);
    letter-spacing:.06em;
    font-variant-numeric:tabular-nums;
    text-align:center;
    opacity:0;
    transition:opacity .6s ease;
  }

  .footer{
    position:fixed; left:0; right:0; bottom:clamp(14px,3vh,34px);
    height:46px;
    z-index:3;
    display:flex; align-items:center; justify-content:center; gap:14px;
    color:var(--cap);
    text-shadow:0 2px 12px rgba(0,0,0,.6);
  }
  /* мобільний: на вузькому екрані центрований футер налазив би на кнопки
     відео/звуку (правий кут) — піднімаємо його над ними */
  @media (max-width:600px){
    .footer{ bottom:88px; }
  }
  .clock{
    font-variant-numeric:tabular-nums;
    font-feature-settings:"tnum" 1;
    font-size:clamp(.9rem,2.4vw,1.3rem);
    letter-spacing:.08em;
  }
  .dot{
    width:9px; height:9px; border-radius:50%;
    background:var(--live);
    box-shadow:0 0 0 0 rgba(92,203,138,.6);
  }
  .dot.pulse{ animation:pulse 1s ease-out; }
  .dot.stale{ background:var(--live-stale); box-shadow:none; }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(92,203,138,.6);}
    100%{box-shadow:0 0 0 12px rgba(92,203,138,0);}
  }

  /* кнопка "подобається": [число] [♥] */
  .like{
    display:inline-flex; align-items:center; gap:7px;
    background:none; border:none; padding:4px 6px; margin:0;
    color:var(--cap); cursor:pointer; font:inherit;
    -webkit-tap-highlight-color:transparent;
    transition:color .25s ease, transform .12s ease;
  }
  .like:hover{ color:#fff; }
  .like:active{ transform:scale(.93); }
  .like-count{
    font-variant-numeric:tabular-nums; font-feature-settings:"tnum" 1;
    font-size:clamp(.9rem,2.4vw,1.3rem); letter-spacing:.06em;
    min-width:1ch; text-align:right;
  }
  .like-heart{ width:18px; height:18px; display:block; }
  .like-heart path{
    fill:none; stroke:currentColor; stroke-width:2;
    transition:fill .3s ease, stroke .3s ease;
  }
  .like.liked{ color:var(--accent); cursor:default; }
  .like.liked .like-heart path{ fill:var(--accent); stroke:var(--accent); }
  .like-heart.pop{ animation:heartpop .45s ease; }
  @keyframes heartpop{
    0%{transform:scale(1);} 35%{transform:scale(1.42);}
    70%{transform:scale(.9);} 100%{transform:scale(1);}
  }

  /* КНОПКИ керування (відео і музика окремо) */
  .controls{
    position:fixed; right:clamp(14px,3vw,28px); bottom:clamp(14px,3vh,34px);
    z-index:4;
    display:flex; gap:12px;
  }
  .ctrl{
    width:46px; height:46px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,.32);
    border:1px solid rgba(255,255,255,.18);
    color:var(--btn);
    cursor:pointer;
    -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
    transition:background .2s ease, opacity .2s ease, transform .1s ease;
    position:relative;
  }
  .ctrl:hover{ background:rgba(0,0,0,.5); }
  .ctrl:active{ transform:scale(.94); }
  .ctrl svg{ width:22px; height:22px; display:block; }
  /* стан "вимкнено": приглушуємо й малюємо діагональну риску */
  .ctrl.off{ opacity:.5; }
  .ctrl.off::after{
    content:""; position:absolute; left:9px; right:9px; top:50%;
    height:2px; background:currentColor; transform:rotate(-45deg);
    border-radius:2px;
  }

  /* напис "Since" у лівому верхньому куті */
  .since{
    position:fixed; top:clamp(14px,3vh,28px); left:clamp(14px,3.2vw,30px);
    z-index:4; color:var(--cap);
    font-size:clamp(.6rem,1.5vw,.92rem);
    letter-spacing:.18em; text-transform:uppercase; font-weight:500;
    text-shadow:0 2px 12px rgba(0,0,0,.6);
    user-select:none;
  }
  /* перемикач мови у правому верхньому куті */
  .lang{
    position:fixed; top:clamp(12px,2.6vh,26px); right:clamp(14px,3.2vw,30px);
    z-index:4;
    padding:6px 13px; border-radius:999px;
    background:rgba(0,0,0,.32); border:1px solid rgba(255,255,255,.18);
    color:var(--btn); cursor:pointer;
    font-size:.78rem; letter-spacing:.14em; font-weight:600;
    -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
    text-shadow:0 1px 8px rgba(0,0,0,.5);
    transition:background .2s ease, transform .1s ease;
    user-select:none;
  }
  .lang:hover{ background:rgba(0,0,0,.5); }
  .lang:active{ transform:scale(.95); }

  @media (prefers-reduced-motion: reduce){
    .dot.pulse{animation:none}
    .num{transition:none}
  }
</style>
</head>
<body>
  <!-- напис "з якого часу" (перемикається з мовою) -->
  <div id="since" class="since">з лютого 2026</div>
  <!-- перемикач мови: показує мову, на яку перемкне -->
  <div id="langToggle" class="lang" role="button" tabindex="0" aria-label="Switch language">EN</div>

  <!-- ВІДЕО-ФОН: поклади ocean.mp4 поруч із цим файлом.
       muted+autoplay+loop+playsinline — щоб відео саме крутилось (звук — окремо з музики). -->
  <video id="bgvideo" autoplay muted loop playsinline preload="auto">
    <source src="ocean.mp4" type="video/mp4">
  </video>
  <div id="overlay"></div>

  <!-- МУЗИКА: поклади Thai.ogg і Thai.mp3 поруч. Автоплей зі звуком браузер блокує —
       вмикається кнопкою. Зацикленість — атрибут loop.
       Два джерела: Ogg (Chrome/Firefox, менший) + MP3 (Safari/iOS, бо Safari Ogg не вміє). -->
  <audio id="bgaudio" loop preload="auto">
    <source src="Thai.ogg" type="audio/ogg">
    <source src="Thai.mp3" type="audio/mpeg">
  </audio>

  <div class="wrap">
    <div class="stat">
      <div class="num" id="pricks">0</div>
      <div class="cap" id="cap-pricks">Проколів пальця</div>
    </div>
    <div class="stat">
      <div class="num" id="units">0</div>
      <div class="cap" id="cap-units">Одиниць інсуліну</div>
    </div>
    <div class="stat">
      <div class="num" id="injections">0</div>
      <div class="cap" id="cap-injections">Уколів інсуліну</div>
    </div>
    <div class="equiv" id="equiv"></div>
  </div>

  <div class="footer">
    <button class="like" id="likeBtn" type="button" aria-label="Подобається">
      <span class="like-count" id="likeCount">0</span>
      <svg class="like-heart" id="likeHeart" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
    </button>
    <span class="dot" id="dot"></span>
    <span class="clock" id="timer">—</span>
  </div>

  <div class="controls">
    <!-- кнопка ВІДЕО -->
    <div class="ctrl" id="btnVideo" role="button" tabindex="0" aria-label="Відео фон" title="Відео фон">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="6" width="13" height="12" rx="2"></rect>
        <path d="M15 10l6-3v10l-6-3"></path>
      </svg>
    </div>
    <!-- кнопка МУЗИКИ -->
    <div class="ctrl off" id="btnAudio" role="button" tabindex="0" aria-label="Музика" title="Музика">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l10-2v13"></path>
        <circle cx="6" cy="18" r="3"></circle>
        <circle cx="16" cy="16" r="3"></circle>
      </svg>
    </div>
  </div>

<script>
/* ===================== НАЛАШТУВАННЯ ===================== */
// Встав сюди /exec URL свого Apps Script веб-застосунку (інструкція в README).
var ENDPOINT = "https://script.google.com/macros/s/AKfycbz_qXlGtLMDIgZR2N7u7vHrPY24HgXLEZZ-vqpefe_X2GJ7B-dJtgsTkLpiWpDkxOZk/exec";
var POLL_MS  = 30000;
var FALLBACK_TIMEOUT_MS = 12000;
/* ======================================================= */

var shown = { pricks: 0, units: 0, injections: 0 };
var anim  = { pricks: null, units: null, injections: null };

/* ---- мови ---- */
var I18N = {
  uk: {
    htmlLang: 'uk', locale: 'uk-UA', langBtn: 'EN',
    'cap-pricks': 'Проколів пальця',
    'cap-units': 'Одиниць інсуліну',
    'cap-injections': 'Уколів інсуліну',
    since: 'з лютого 2026',
    equivKwh: 'вартість дня ≈ {n} кВт·год',
    equivItem: 'вартість дня ≈ {v} {name}',
    equivNames: { oil: 'нафти', wheat: 'пшениці', coffee: 'кави', gold: 'золота' },
    likeLabel: 'Подобається'
  },
  en: {
    htmlLang: 'en', locale: 'en-US', langBtn: 'UK',
    'cap-pricks': 'Finger pricks',
    'cap-units': 'Insulin units',
    'cap-injections': 'Insulin injections',
    since: 'Since February 2026',
    equivKwh: 'a day ≈ {n} kWh',
    equivItem: 'a day ≈ {v} {name}',
    equivNames: { oil: 'of oil', wheat: 'of wheat', coffee: 'of coffee', gold: 'of gold' },
    likeLabel: 'Like'
  }
};
var lang = 'uk';
try { var saved = localStorage.getItem('zen_lang'); if (saved === 'en' || saved === 'uk') lang = saved; } catch(e){}

// стан, що приходить з ендпоінта
var firstRecordMs = null;   // старт таймера
var kwhPerDay = null;       // еквівалент kWh
var equivData = null;       // товарні еквіваленти {oil,wheat,coffee,gold} або null

// кеш форматувальників чисел за локаллю (усі числа — цілі, без розділювача розрядів)
var fmtCache = {};
function getFmt(loc){
  if (!fmtCache[loc]) fmtCache[loc] = new Intl.NumberFormat(loc, { maximumFractionDigits:0, useGrouping:false });
  return fmtCache[loc];
}
function fmt(key, v){
  return getFmt(I18N[lang].locale).format(Math.round(v));
}

/* ---- рядок еквівалента: kWh + товарна ротація після лайка ---- */
// для EN перекладаємо кириличну одиницю з M1 ("3.1 л" -> "3.1 L")
var UNIT_EN = { 'л':'L', 'кг':'kg', 'г':'g', 'мг':'mg' };
function localizeEquivValue(val){
  if (lang === 'uk') return val;
  var parts = String(val).split(' ');
  if (parts.length === 2 && UNIT_EN[parts[1]]) return parts[0] + ' ' + UNIT_EN[parts[1]];
  return val;
}

// список доступних "слотів": kWh (завжди перший) + наявні товари
function buildEquivSlots(){
  var slots = [];
  if (kwhPerDay != null) slots.push({ type:'kwh' });
  if (equivData){
    var order = ['oil','wheat','coffee','gold'];
    for (var i=0;i<order.length;i++){
      var k = order[i];
      if (equivData[k]) slots.push({ type:'item', key:k });
    }
  }
  return slots;
}

// біржі-джерела цін (статичні — біржі не міняються; мовно-нейтральні абревіатури)
var EXCH = { oil:'ICE', wheat:'CBOT', coffee:'ICE', gold:'COMEX' };

function equivSlotText(slot){
  var t = I18N[lang];
  if (slot.type === 'kwh') return t.equivKwh.replace('{n}', String(kwhPerDay));
  var val = localizeEquivValue(equivData[slot.key]);
  var name = t.equivNames[slot.key] || '';
  var exch = EXCH[slot.key] ? ' · ' + EXCH[slot.key] : '';
  return t.equivItem.replace('{v}', val).replace('{name}', name) + exch;
}

var equivIdx = 0;
var equivTimer = null;

// індекс першого ТОВАРНОГО слота (не kWh) — щоб лайкнутий стартував з товару
function firstItemIdx(slots){
  for (var i=0;i<slots.length;i++){ if (slots[i].type==='item') return i; }
  return 0;
}

function renderEquiv(){
  var el = document.getElementById('equiv');
  var slots = buildEquivSlots();
  if (slots.length === 0){ stopEquivRotation(); el.textContent = ''; el.style.opacity = '0'; return; }

  if (!hasLiked){
    // до лайка: лише kWh, фіксовано, без ротації
    stopEquivRotation();
    equivIdx = 0;
    var kwhSlot = null;
    for (var i=0;i<slots.length;i++){ if (slots[i].type==='kwh'){ kwhSlot = slots[i]; break; } }
    if (!kwhSlot) kwhSlot = slots[0];
    el.textContent = equivSlotText(kwhSlot);
    el.style.opacity = '1';
    return;
  }

  // лайкнуто: якщо ротація ще НЕ стартувала (свіжий захід уже-лайкнутого) —
  // почати одразу з ТОВАРУ, а не з kWh; далі крутиться як зазвичай
  if (equivTimer === null) equivIdx = firstItemIdx(slots);
  if (equivIdx >= slots.length) equivIdx = 0;
  el.textContent = equivSlotText(slots[equivIdx]);
  el.style.opacity = '1';
  ensureEquivRotation(slots);
}

function ensureEquivRotation(slots){
  if (equivTimer) return;
  if (!slots) slots = buildEquivSlots();
  if (slots.length <= 1) return;   // нема чим крутити (товари ще не завантажились) — не стартуємо
  equivTimer = setInterval(function(){
    if (!hasLiked){ stopEquivRotation(); return; }
    var s = buildEquivSlots();
    if (s.length <= 1) return;
    equivIdx = (equivIdx + 1) % s.length;
    fadeEquivTo(equivSlotText(s[equivIdx]));
  }, 30000);
}

function stopEquivRotation(){
  if (equivTimer){ clearInterval(equivTimer); equivTimer = null; }
}

function fadeEquivTo(text){
  var el = document.getElementById('equiv');
  el.style.opacity = '0';
  setTimeout(function(){ el.textContent = text; el.style.opacity = '1'; }, 600);
}

function applyLang(l){
  lang = (l === 'en' || l === 'uk') ? l : 'uk';
  var t = I18N[lang];
  document.documentElement.lang = t.htmlLang;
  document.getElementById('cap-pricks').textContent = t['cap-pricks'];
  document.getElementById('cap-units').textContent = t['cap-units'];
  document.getElementById('cap-injections').textContent = t['cap-injections'];
  document.getElementById('since').textContent = t.since;
  document.getElementById('langToggle').textContent = t.langBtn;
  // переформатувати поточні числа під нову локаль (миттєво, без анімації)
  document.getElementById('pricks').textContent     = fmt('pricks', shown.pricks);
  document.getElementById('units').textContent      = fmt('units', shown.units);
  document.getElementById('injections').textContent = fmt('injections', shown.injections);
  renderEquiv();
  var likeBtn = document.getElementById('likeBtn');
  if (likeBtn) likeBtn.setAttribute('aria-label', t.likeLabel);
  try { localStorage.setItem('zen_lang', lang); } catch(e){}
}

function animateTo(key, target){
  var el = document.getElementById(key);
  var from = shown[key];
  if (from === target){ el.textContent = fmt(key, target); return; }

  if (target > from){
    el.classList.add('flash');
    setTimeout(function(){ el.classList.remove('flash'); }, 1000);
  }

  if (anim[key]) cancelAnimationFrame(anim[key]);
  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduce){ shown[key] = target; el.textContent = fmt(key, target); return; }

  var dur = 1200, t0 = performance.now();
  function step(now){
    var p = Math.min(1, (now - t0) / dur);
    var eased = 1 - Math.pow(1 - p, 3);
    var val = from + (target - from) * eased;
    el.textContent = fmt(key, val);
    if (p < 1){ anim[key] = requestAnimationFrame(step); }
    else { shown[key] = target; el.textContent = fmt(key, target); anim[key] = null; }
  }
  anim[key] = requestAnimationFrame(step);
}

function setDot(ok){
  var dot = document.getElementById('dot');
  if (ok){
    dot.classList.remove('stale');
    dot.classList.remove('pulse'); void dot.offsetWidth; dot.classList.add('pulse');
  } else {
    dot.classList.add('stale');
  }
}

function applyData(d){
  if (!d || d.ok === false) { setDot(false); return; }
  if (typeof d.pricks === 'number')     animateTo('pricks', d.pricks);
  if (typeof d.units === 'number')      animateTo('units', d.units);
  if (typeof d.injections === 'number') animateTo('injections', d.injections);
  if (typeof d.firstRecord === 'number'){ firstRecordMs = d.firstRecord; tickTimer(); }
  if (typeof d.kwhPerDay === 'number'){ kwhPerDay = d.kwhPerDay; renderEquiv(); }
  if (d.equiv && typeof d.equiv === 'object'){ equivData = d.equiv; renderEquiv(); }
  if (typeof d.likes === 'number'){ likesShown = Math.max(likesShown, d.likes); renderLikeState(); }
  setDot(true);
}

/* ---- JSONP (назовні йдуть лише 3 числа) ---- */
var jsonpId = 0;
function fetchStats(){
  if (!ENDPOINT || ENDPOINT.indexOf('PASTE_') === 0) return;
  jsonpId++;
  var fn = '__zen_cb_' + jsonpId + '_' + Date.now();
  var script = document.createElement('script');
  var done = false;

  var timer = setTimeout(function(){
    if (done) return; done = true; cleanup(); setDot(false);
  }, FALLBACK_TIMEOUT_MS);

  function cleanup(){
    try { delete window[fn]; } catch(e){ window[fn] = undefined; }
    if (script.parentNode) script.parentNode.removeChild(script);
    clearTimeout(timer);
  }
  window[fn] = function(data){ if (done) return; done = true; cleanup(); applyData(data); };
  script.onerror = function(){ if (done) return; done = true; cleanup(); setDot(false); };

  var sep = ENDPOINT.indexOf('?') >= 0 ? '&' : '?';
  script.src = ENDPOINT + sep + 'callback=' + fn + '&_=' + Date.now();
  document.head.appendChild(script);
}

/* ---- ЛАЙКИ (спільний лічильник; localStorage стереже від повтору з браузера) ---- */
var hasLiked = false;
try { hasLiked = localStorage.getItem('zen_liked') === '1'; } catch(e){}
var likesShown = 0;

function renderLikeState(){
  var btn = document.getElementById('likeBtn');
  var cnt = document.getElementById('likeCount');
  if (!btn || !cnt) return;
  cnt.textContent = String(likesShown);
  if (hasLiked) btn.classList.add('liked'); else btn.classList.remove('liked');
}

function popHeart(){
  var h = document.getElementById('likeHeart');
  if (!h) return;
  h.classList.remove('pop'); void h.offsetWidth; h.classList.add('pop');
}

/* JSONP-запит лайка на той самий ендпоінт із ?action=like */
function jsonpLike(cb){
  if (!ENDPOINT || ENDPOINT.indexOf('PASTE_') === 0){ cb(null); return; }
  jsonpId++;
  var fn = '__zen_like_' + jsonpId + '_' + Date.now();
  var script = document.createElement('script');
  var done = false;
  var timer = setTimeout(function(){ if (done) return; done = true; cleanup(); cb(null); }, FALLBACK_TIMEOUT_MS);
  function cleanup(){
    try { delete window[fn]; } catch(e){ window[fn] = undefined; }
    if (script.parentNode) script.parentNode.removeChild(script);
    clearTimeout(timer);
  }
  window[fn] = function(data){ if (done) return; done = true; cleanup(); cb(data); };
  script.onerror = function(){ if (done) return; done = true; cleanup(); cb(null); };
  var sep = ENDPOINT.indexOf('?') >= 0 ? '&' : '?';
  script.src = ENDPOINT + sep + 'action=like&callback=' + fn + '&_=' + Date.now();
  document.head.appendChild(script);
}

function sendLike(){
  if (hasLiked) return;                       // уже лайкнуто з цього браузера
  // оптимістично: одразу показуємо +1 і заповнене серце
  hasLiked = true;
  likesShown = likesShown + 1;
  renderLikeState();
  popHeart();
  // лайк ОЖИВЛЯЄ рядок одразу: плавний перехід kWh -> перший товар (не чекати 30с)
  (function(){
    var slots = buildEquivSlots();
    if (slots.length >= 2){
      equivIdx = firstItemIdx(slots);
      fadeEquivTo(equivSlotText(slots[equivIdx]));
      ensureEquivRotation(slots);
    } else {
      renderEquiv();   // товарів ще нема — самовиправиться при завантаженні даних
    }
  })();
  try { localStorage.setItem('zen_liked', '1'); } catch(e){}

  jsonpLike(function(data){
    if (data && data.ok && typeof data.likes === 'number'){
      likesShown = Math.max(likesShown, data.likes);   // звіряємось із сервером
      renderLikeState();
    } else {
      // лайк не зарахувався — відкат, щоб можна було повторити
      hasLiked = false;
      likesShown = Math.max(0, likesShown - 1);
      try { localStorage.removeItem('zen_liked'); } catch(e){}
      renderLikeState();
      renderEquiv();   // назад до фіксованого kWh
    }
  });
}

(function(){
  var btn = document.getElementById('likeBtn');
  if (btn) btn.addEventListener('click', sendLike);
  renderLikeState();   // показати стан (заповнене серце, якщо вже лайкав) до першого fetch
})();

/* ---- таймер: скільки ведеться лічильник (від firstRecord) ---- */
function tickTimer(){
  var el = document.getElementById('timer');
  if (firstRecordMs == null){ el.textContent = '—'; return; }
  var diff = Date.now() - firstRecordMs;
  if (diff < 0) diff = 0;
  var s = Math.floor(diff / 1000);
  var days = Math.floor(s / 86400);
  var hh = Math.floor((s % 86400) / 3600);
  var mm = Math.floor((s % 3600) / 60);
  var ss = s % 60;
  var p = function(n){ return String(n).padStart(2,'0'); };
  el.textContent = days + ':' + p(hh) + ':' + p(mm) + ':' + p(ss);
}
setInterval(tickTimer, 1000); tickTimer();

/* ---- опитування з паузою на прихованій вкладці ---- */
var pollTimer = null;
function startPolling(){ if (pollTimer) return; fetchStats(); pollTimer = setInterval(fetchStats, POLL_MS); }
function stopPolling(){ if (pollTimer){ clearInterval(pollTimer); pollTimer = null; } }
document.addEventListener('visibilitychange', function(){
  if (document.hidden){ stopPolling(); } else { startPolling(); }
});
startPolling();

/* ===================== КЕРУВАННЯ ВІДЕО / МУЗИКОЮ ===================== */
var video = document.getElementById('bgvideo');
var audio = document.getElementById('bgaudio');
var btnVideo = document.getElementById('btnVideo');
var btnAudio = document.getElementById('btnAudio');

// ВІДЕО: стартує саме (muted autoplay). Кнопка — пауза/пуск.
function toggleVideo(){
  if (video.paused){
    video.play().then(function(){ btnVideo.classList.remove('off'); })
                .catch(function(){ /* якщо не вийшло — лишаємо як є */ });
  } else {
    video.pause();
    btnVideo.classList.add('off');
  }
}
video.addEventListener('play',  function(){ btnVideo.classList.remove('off'); });
video.addEventListener('pause', function(){ btnVideo.classList.add('off'); });

// МУЗИКА: автоплей зі звуком блокується — стартує off, вмикається кнопкою.
function toggleAudio(){
  if (audio.paused){
    audio.play().then(function(){ btnAudio.classList.remove('off'); })
                .catch(function(){ btnAudio.classList.add('off'); });
  } else {
    audio.pause();
    btnAudio.classList.add('off');
  }
}
audio.addEventListener('play',  function(){ btnAudio.classList.remove('off'); });
audio.addEventListener('pause', function(){ btnAudio.classList.add('off'); });

function bindBtn(el, fn){
  el.addEventListener('click', fn);
  el.addEventListener('keydown', function(e){
    if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); fn(); }
  });
}
bindBtn(btnVideo, toggleVideo);
bindBtn(btnAudio, toggleAudio);

/* перемикач мови */
var langToggle = document.getElementById('langToggle');
bindBtn(langToggle, function(){ applyLang(lang === 'uk' ? 'en' : 'uk'); });
applyLang(lang);   // застосувати збережену (або дефолтну) мову на старті

// деякі браузери блокують навіть muted-автоплей до взаємодії — підстрахуємось
window.addEventListener('load', function(){
  var pr = video.play();
  if (pr && pr.catch){ pr.catch(function(){ btnVideo.classList.add('off'); }); }
});
</script>
